<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>114年國中會考數學 — 七年級考古題複習</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#0D7490;--pri-light:#E0F7FA;--pri-dark:#0A5F76;
  --ok:#15803D;--ok-bg:#DCFCE7;
  --err:#DC2626;--err-bg:#FEE2E2;
  --border:#E5E7EB;--text:#111827;--muted:#6B7280;
  --bg:#F0F9FF;--card:#FFFFFF;
}
body{font-family:"Noto Sans TC",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:200;background:var(--pri);color:#fff;display:flex;align-items:center;gap:12px;padding:12px 16px;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.topbar h1{font-size:16px;font-weight:700;flex:1}
.topbar p{font-size:11px;opacity:.75;margin-top:1px}
.prog-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;white-space:nowrap}
.prog-track{height:3px;background:rgba(255,255,255,.25)}
.prog-fill{height:3px;background:#fff;transition:width .4s ease}
.page-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:190;gap:8px}
.nav-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1}
.nav-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:#fff;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.nav-dot.active{border-color:var(--pri);background:var(--pri);color:#fff}
.nav-dot.done{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.nav-btn{padding:7px 14px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0}
.nav-prev{background:var(--border);color:var(--text)}
.nav-next{background:var(--pri);color:#fff}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.q-pages{overflow:hidden}
.q-page{display:none;padding:16px;animation:fadeIn .2s ease}
.q-page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.q-card{background:var(--card);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.q-card-head{background:var(--pri);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:10px}
.q-num-badge{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.q-head-text .q-topic{font-size:11px;opacity:.8}
.q-head-text .q-no{font-size:15px;font-weight:700}
.q-card-body{padding:18px}
.q-stem{font-size:15.5px;line-height:1.85;margin-bottom:14px;font-weight:500}
/* Anno */
.anno-wrap-outer{margin:0 0 14px}
.anno-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.anno-toolbar span.label{font-size:11px;color:var(--muted)}
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--border);flex-shrink:0;transition:transform .1s}
.cdot.sel{box-shadow:0 0 0 2.5px var(--pri);transform:scale(1.15)}
.abtn{padding:4px 10px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:600}
.abtn.sel{background:var(--pri);color:#fff;border-color:var(--pri)}
.abtn:hover{background:var(--pri-light)}
.anno-img-wrap{position:relative;display:inline-block;width:100%;touch-action:none;cursor:crosshair;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#f8f8f8;text-align:center}
.anno-img-wrap img{max-width:100%;display:inline-block;pointer-events:none;user-select:none;-webkit-user-select:none}
.anno-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
/* Scratch pad */
.scratch-wrap{margin:0 0 14px}
.scratch-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.scratch-label span{font-weight:600}
.scratch-area{position:relative;width:100%;border-radius:10px;overflow:hidden;border:2px dashed #CBD5E1;background:#FAFBFF;touch-action:none;cursor:crosshair}
.scratch-canvas{display:block;width:100%;touch-action:none}
.scratch-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
/* Options */
.options{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.opt:active{transform:scale(.98)}
.opt:hover{border-color:var(--pri);background:var(--pri-light)}
.opt.sel{border-color:var(--pri);background:var(--pri-light)}
.opt.ok{border-color:var(--ok);background:var(--ok-bg)}
.opt.er{border-color:var(--err);background:var(--err-bg)}
.opt-key{font-size:15px;font-weight:800;min-width:20px;color:var(--pri);flex-shrink:0}
.opt.ok .opt-key{color:var(--ok)}
.opt.er .opt-key{color:var(--err)}
.opt-txt{font-size:15px;line-height:1.7;flex:1}
.opt-icon{margin-left:auto;font-size:18px;flex-shrink:0}
.q-status-bar{margin-top:12px;padding:8px 12px;border-radius:8px;font-size:13px;background:var(--pri-light);color:var(--pri);font-weight:500;transition:all .2s}
.q-status-bar.empty{background:#F9FAFB;color:var(--muted)}
.bottom-nav{padding:16px;display:flex;gap:10px}
.btn-prev-full{flex:1;padding:13px;border:2px solid var(--border);background:#fff;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;color:var(--text)}
.btn-next-full{flex:2;padding:13px;background:var(--pri);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
.btn-submit-full{flex:1;padding:13px;background:#7C3AED;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-size:20px;font-weight:800;margin-bottom:6px}
.modal p{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.pwd-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:10px;font-size:20px;letter-spacing:6px;text-align:center;font-weight:700;transition:border .15s;margin-bottom:10px}
.pwd-input:focus{outline:none;border-color:var(--pri)}
.pwd-err{color:var(--err);font-size:13px;margin-bottom:12px;display:none;font-weight:500}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.mbtn-cancel{background:#F3F4F6;color:var(--text)}
.mbtn-ok{background:var(--pri);color:#fff}
.results{display:none;padding:16px;max-width:860px;margin:0 auto}
.score-hero{background:linear-gradient(135deg,#0D7490,#7C3AED);color:#fff;border-radius:18px;padding:28px;text-align:center;margin-bottom:20px}
.score-hero .big{font-size:56px;font-weight:900;line-height:1}
.score-hero .sub{font-size:14px;opacity:.85;margin-top:6px}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.sg-cell{background:#fff;border-radius:10px;border:1px solid var(--border);padding:8px 4px;text-align:center}
.sg-cell .qno{font-size:11px;font-weight:700;color:var(--pri)}
.sg-cell .icon{font-size:20px;margin:3px 0}
.sg-cell .ans{font-size:10px;color:var(--muted)}
.res-card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.res-card-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.res-card-head.ok{background:var(--ok-bg)}
.res-card-head.er{background:var(--err-bg)}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff}
.badge.ok{background:var(--ok)}
.badge.er{background:var(--err)}
.res-card-body{padding:16px}
.res-q-stem{font-size:14px;line-height:1.7;margin-bottom:10px;color:var(--muted)}
.res-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.res-fig{text-align:center;margin:8px 0}
.res-fig img{max-width:100%;border-radius:8px;border:1px solid var(--border)}
.expl{background:var(--pri-light);border-left:4px solid var(--pri);border-radius:0 8px 8px 0;padding:14px;font-size:13.5px;line-height:1.85}
.expl strong{color:var(--pri-dark)}
.katex{font-size:1em}
</style>
</head>
<body>

<div class="topbar">
  <div style="flex:1">
    <p>114年國中教育會考數學科</p>
    <h1>七年級考古題複習</h1>
  </div>
  <div class="prog-badge" id="prog-badge">0 / 9</div>
</div>
<div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

<div class="page-nav">
  <button class="nav-btn nav-prev" id="btn-prev" onclick="goPrev()" disabled>&#8592;</button>
  <div class="nav-dots" id="nav-dots"></div>
  <button class="nav-btn nav-next" id="btn-next" onclick="goNext()">&#8594;</button>
</div>

<div class="q-pages" id="q-pages"></div>
<div class="bottom-nav" id="bottom-nav"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>🔐 解鎖解答</h2>
    <p>請輸入老師提供的密碼，解鎖所有題目的詳解與答案核對。</p>
    <input class="pwd-input" type="password" id="pwd-input" maxlength="10" placeholder="密碼" onkeydown="if(event.key==='Enter')doUnlock()">
    <div class="pwd-err" id="pwd-err">❌ 密碼錯誤，請再試一次</div>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeModal()">取消</button>
      <button class="mbtn-ok" onclick="doUnlock()">解鎖</button>
    </div>
  </div>
</div>

<div class="results" id="results"></div>

<script>
// ── KaTeX render ──
function tex(str){
  if(!str) return '';
  return str.replace(/\$([^$]+)\$/g,function(_,math){
    try{return katex.renderToString(math,{throwOnError:false});}
    catch(e){return math;}
  });
}

A,B,C,D,E 在數線上由左到右，所以 $a<b<c<d<e$。<br><br>

// ── State ──
let cur=0;
const answers={};
const annoData={};
const scratchData={};

function totalQ(){return QS.length;}

function updateProgress(){
  const done=Object.keys(answers).length;
  document.getElementById('prog-badge').textContent=done+' / '+totalQ();
  document.getElementById('prog-fill').style.width=(done/totalQ()*100)+'%';
  QS.forEach((q,i)=>{
    const dot=document.getElementById('dot-'+i);
    if(!dot)return;
    dot.className='nav-dot';
    if(i===cur)dot.classList.add('active');
    else if(answers[q.id])dot.classList.add('done');
  });
}

function buildScratch(qId,height=220){
  return `<div class="scratch-wrap">
    <div class="scratch-label">
      <span>✏️ 計算區</span>
      <div class="scratch-toolbar" id="stb-${qId}">
        <span class="cdot sel" style="background:#1e293b" onclick="setSColor(${qId},'#1e293b',this)"></span>
        <span class="cdot" style="background:#E22D2D" onclick="setSColor(${qId},'#E22D2D',this)"></span>
        <span class="cdot" style="background:#2563EB" onclick="setSColor(${qId},'#2563EB',this)"></span>
        <button class="abtn" onclick="clearScratch(${qId})">清除</button>
      </div>
    </div>
    <div class="scratch-area" id="sarea-${qId}" style="height:${height}px">
      <canvas class="scratch-canvas" id="scv-${qId}" style="height:${height}px"></canvas>
    </div>
  </div>`;
}

function buildAnno(qId, figKey){
  return `<div class="anno-wrap-outer">
    <div class="anno-toolbar" id="atb-${qId}">
      <span class="label">✏️ 標記：</span>
      <span class="cdot sel" style="background:#E22D2D" onclick="setColor(${qId},'#E22D2D',this)"></span>
      <span class="cdot" style="background:#2563EB" onclick="setColor(${qId},'#2563EB',this)"></span>
      <span class="cdot" style="background:#16A34A" onclick="setColor(${qId},'#16A34A',this)"></span>
      <span class="cdot" style="background:#F59E0B" onclick="setColor(${qId},'#F59E0B',this)"></span>
      <button class="abtn sel" data-mode="pen" onclick="setMode(${qId},'pen',this)">畫筆</button>
      <button class="abtn" data-mode="hi" onclick="setMode(${qId},'hi',this)">螢光筆</button>
      <button class="abtn" onclick="clearAnno(${qId})">清除</button>
    </div>
    <div class="anno-img-wrap" id="aiw-${qId}">
      <img src="${FIGS[figKey]}" alt="題目圖" draggable="false" id="aimg-${qId}">
      <canvas class="anno-canvas" id="acv-${qId}"></canvas>
    </div>
  </div>`;
}

function buildPages(){
  const pagesDiv=document.getElementById('q-pages');
  const dotsDiv=document.getElementById('nav-dots');
  pagesDiv.innerHTML=''; dotsDiv.innerHTML='';

  QS.forEach((q,i)=>{
    const dot=document.createElement('div');
    dot.className='nav-dot'+(i===0?' active':'');
    dot.id='dot-'+i; dot.textContent=q.id;
    dot.onclick=()=>goTo(i);
    dotsDiv.appendChild(dot);

    let mediaHtml='';
    if(q.fig){
      mediaHtml=buildAnno(q.id,q.fig)+buildScratch(q.id,180);
    } else {
      mediaHtml=buildScratch(q.id,260);
    }

    const optsHtml=q.opts.map(o=>`
      <div class="opt" id="opt-${q.id}-${o.k}" data-k="${o.k}" onclick="pick(${q.id},'${o.k}')">
        <span class="opt-key">${o.k}</span>
        <span class="opt-txt">${tex(o.t)}</span>
      </div>`).join('');

    const page=document.createElement('div');
    page.className='q-page'+(i===0?' active':'');
    page.id='page-'+i;
    page.innerHTML=`
      <div class="q-card">
        <div class="q-card-head">
          <div class="q-num-badge">${q.id}</div>
          <div class="q-head-text">
            <div class="q-topic">📌 ${q.topic}</div>
            <div class="q-no">第 ${q.id} 題</div>
          </div>
        </div>
        <div class="q-card-body">
          <div class="q-stem">${tex(q.stem)}</div>
          ${mediaHtml}
          <div class="options">${optsHtml}</div>
          <div class="q-status-bar empty" id="sts-${q.id}">尚未選擇答案</div>
        </div>
      </div>`;
    pagesDiv.appendChild(page);
  });
  buildBottomNav(); updateProgress();
}

function buildBottomNav(){
  const bn=document.getElementById('bottom-nav');
  const isLast=(cur===totalQ()-1);
  bn.innerHTML=`
    ${cur>0?`<button class="btn-prev-full" onclick="goPrev()">← 上一題</button>`:''}
    ${!isLast?`<button class="btn-next-full" onclick="goNext()">下一題 →</button>`
      :`<button class="btn-submit-full" onclick="openModal()">🔐 核對全部答案</button>`}`;
}

function goTo(i){
  if(i<0||i>=totalQ())return;
  document.getElementById('page-'+cur)?.classList.remove('active');
  document.getElementById('dot-'+cur)?.classList.remove('active');
  cur=i;
  document.getElementById('page-'+cur)?.classList.add('active');
  document.getElementById('dot-'+cur)?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  buildBottomNav(); updateProgress();
  document.getElementById('btn-prev').disabled=(cur===0);
  document.getElementById('btn-next').disabled=(cur===totalQ()-1);
  const q=QS[i];
  if(q.fig&&!annoData[q.id])initAnno(q.id);
  if(!scratchData[q.id])initScratch(q.id);
}
function goNext(){goTo(cur+1);}
function goPrev(){goTo(cur-1);}

function pick(qId,k){
  answers[qId]=k;
  const q=QS.find(q=>q.id===qId);
  q.opts.forEach(o=>{
    document.getElementById(`opt-${qId}-${o.k}`).className='opt'+(o.k===k?' sel':'');
  });
  const sts=document.getElementById('sts-'+qId);
  sts.textContent='已選擇答案：'+k; sts.className='q-status-bar';
  updateProgress();
}

// ── Anno ──
function initAnno(qId){
  const img=document.getElementById('aimg-'+qId);
  const cv=document.getElementById('acv-'+qId);
  const state={color:'#E22D2D',mode:'pen',drawing:false,strokes:[]};
  annoData[qId]=state;
  function resize(){cv.width=img.offsetWidth;cv.height=img.offsetHeight;redraw();}
  function redraw(){
    const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
    state.strokes.forEach(s=>{
      if(s.pts.length<2)return;
      ctx.save();ctx.strokeStyle=s.color;ctx.lineWidth=s.mode==='hi'?14:3;
      ctx.globalAlpha=s.mode==='hi'?0.3:1;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(s.pts[0].x,s.pts[0].y);
      s.pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();ctx.restore();
    });
  }
  function pos(e){
    const r=cv.getBoundingClientRect();
    const sx=cv.width/r.width,sy=cv.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
  }
  cv.addEventListener('mousedown',e=>{e.preventDefault();state.drawing=true;state.strokes.push({color:state.color,mode:state.mode,pts:[pos(e)]});});
  cv.addEventListener('mousemove',e=>{if(!state.drawing)return;e.preventDefault();state.strokes.at(-1).pts.push(pos(e));redraw();});
  cv.addEventListener('mouseup',()=>state.drawing=false);
  cv.addEventListener('touchstart',e=>{e.preventDefault();state.drawing=true;state.strokes.push({color:state.color,mode:state.mode,pts:[pos(e)]});},{passive:false});
  cv.addEventListener('touchmove',e=>{if(!state.drawing)return;e.preventDefault();state.strokes.at(-1).pts.push(pos(e));redraw();},{passive:false});
  cv.addEventListener('touchend',()=>state.drawing=false);
  img.addEventListener('load',resize);
  if(img.complete)setTimeout(resize,80);
  new ResizeObserver(resize).observe(img);
}
function setColor(qId,c,el){
  if(annoData[qId])annoData[qId].color=c;
  document.getElementById('atb-'+qId).querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}
function setMode(qId,m,el){
  if(annoData[qId])annoData[qId].mode=m;
  document.getElementById('atb-'+qId).querySelectorAll('[data-mode]').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}
function clearAnno(qId){
  if(annoData[qId])annoData[qId].strokes=[];
  const cv=document.getElementById('acv-'+qId);
  if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

// ── Scratch Pad ──
function initScratch(qId){
  const area=document.getElementById('sarea-'+qId);
  const cv=document.getElementById('scv-'+qId);
  if(!cv)return;
  const state={color:'#1e293b',drawing:false,strokes:[]};
  scratchData[qId]=state;
  function resize(){cv.width=area.offsetWidth;cv.height=area.offsetHeight;redrawS();}
  function redrawS(){
    const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
    // Draw grid lines
    ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
    for(let x=0;x<cv.width;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
    for(let y=0;y<cv.height;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}
    state.strokes.forEach(s=>{
      if(s.pts.length<2)return;
      ctx.save();ctx.strokeStyle=s.color;ctx.lineWidth=2.5;
      ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=1;
      ctx.beginPath();ctx.moveTo(s.pts[0].x,s.pts[0].y);
      s.pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();ctx.restore();
    });
  }
  function pos(e){
    const r=cv.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  }
  cv.addEventListener('mousedown',e=>{e.preventDefault();state.drawing=true;state.strokes.push({color:state.color,pts:[pos(e)]});});
  cv.addEventListener('mousemove',e=>{if(!state.drawing)return;e.preventDefault();state.strokes.at(-1).pts.push(pos(e));redrawS();});
  cv.addEventListener('mouseup',()=>state.drawing=false);
  cv.addEventListener('touchstart',e=>{e.preventDefault();state.drawing=true;state.strokes.push({color:state.color,pts:[pos(e)]});},{passive:false});
  cv.addEventListener('touchmove',e=>{if(!state.drawing)return;e.preventDefault();state.strokes.at(-1).pts.push(pos(e));redrawS();},{passive:false});
  cv.addEventListener('touchend',()=>state.drawing=false);
  new ResizeObserver(resize).observe(area);
  setTimeout(resize,100);
}
function setSColor(qId,c,el){
  if(scratchData[qId])scratchData[qId].color=c;
  document.getElementById('stb-'+qId).querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}
function clearScratch(qId){
  if(scratchData[qId])scratchData[qId].strokes=[];
  const area=document.getElementById('sarea-'+qId);
  const cv=document.getElementById('scv-'+qId);
  if(!cv)return;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  for(let x=0;x<cv.width;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
  for(let y=0;y<cv.height;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}
}

// ── Modal ──
function openModal(){
  document.getElementById('modal-bg').classList.add('show');
  document.getElementById('pwd-input').value='';
  document.getElementById('pwd-err').style.display='none';

function doUnlock(){
  if(document.getElementById('pwd-input').value==='lcjh'){
    closeModal();showResults();
  }else{
    document.getElementById('pwd-err').style.display='block';
    document.getElementById('pwd-input').value='';

// ── Results ──
function showResults(){
  document.getElementById('q-pages').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.querySelector('.page-nav').style.display='none';
  document.querySelector('.prog-track').style.display='none';
  const rs=document.getElementById('results');
  rs.style.display='block';
  let ok=0;
  QS.forEach(q=>{if(answers[q.id]===q.ans)ok++;});
  const grid=QS.map(q=>{
    const ua=answers[q.id]||'—';const isOk=ua===q.ans;
    return`<div class="sg-cell"><div class="qno">第${q.id}題</div><div class="icon">${isOk?'✅':'❌'}</div><div class="ans">你：${ua}</div><div class="ans" style="color:${isOk?'var(--ok)':'var(--err)'}">解：${q.ans}</div></div>`;
  }).join('');
  const cards=QS.map(q=>{
    const ua=answers[q.id]||'（未作答）';const isOk=ua===q.ans;
    const figHtml=q.fig?`<div class="res-fig"><img src="${FIGS[q.fig]}" alt="題目圖"></div>`:'';
    const optsHtml=q.opts.map(o=>{
      let cls='opt';
      const isAns=o.k===q.ans,isUser=o.k===ua&&ua!==q.ans;
      if(isAns)cls+=' ok';else if(isUser)cls+=' er';
      return`<div class="${cls}" style="pointer-events:none"><span class="opt-key">${o.k}</span><span class="opt-txt">${tex(o.t)}</span>${isAns?'<span class="opt-icon">✓</span>':''}${isUser?'<span class="opt-icon">✗</span>':''}</div>`;
    }).join('');
    const explR=q.expl.replace(/\$([^$]+)\$/g,function(_,m){
      try{return katex.renderToString(m,{throwOnError:false});}catch(e){return m;}
    });
    return`<div class="res-card">
      <div class="res-card-head ${isOk?'ok':'er'}">
        <div class="q-num-badge" style="background:${isOk?'var(--ok)':'var(--err)'};color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0">${q.id}</div>
        <strong style="font-size:15px">第 ${q.id} 題</strong>
        <span class="badge ${isOk?'ok':'er'}">${isOk?'✓ 答對':'✗ 答錯'}</span>
        <span style="margin-left:auto;font-size:13px;color:var(--muted)">你：<strong>${ua}</strong> ／ 正解：<strong style="color:${isOk?'var(--ok)':'var(--err)'}">${q.ans}</strong></span>
      </div>
      <div class="res-card-body">
        <div class="res-q-stem">${tex(q.stem)}</div>
        ${figHtml}
        <div class="res-opts">${optsHtml}</div>
        <div class="expl">📝 <strong>詳解</strong><br><br>${explR}</div>
      </div></div>`;
  }).join('');
  rs.innerHTML=`
    <div class="score-hero">
      <div style="font-size:13px;opacity:.8;margin-bottom:8px">114年國中會考數學 · 七年級考古題</div>
      <div class="big">${ok} <span style="font-size:28px;font-weight:400;opacity:.7">/ ${totalQ()}</span></div>
      <div class="sub">正確率 ${Math.round(ok/totalQ()*100)}%　·　答對 ${ok} 題，答錯 ${totalQ()-ok} 題</div>
    </div>
    <div class="score-grid">${grid}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 2px">📖 各題詳解</div>
    ${cards}
    <div style="padding:20px 0 40px;text-align:center">
      <button onclick="location.reload()" style="padding:13px 36px;background:var(--pri);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer">🔄 重新練習</button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Init ──
window.addEventListener('DOMContentLoaded',()=>{
  buildPages();
  const q=QS[0];
  if(q.fig)initAnno(q.id);
  initScratch(q.id);
  document.getElementById('btn-prev').disabled=true;
  document.getElementById('btn-next').disabled=false;
});
</script>
</body>
</html>
